<!DOCTYPE html>
<html>
<head>
  <title>❤️ Nosotros ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(pink, #ffb6c1);
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    /* CONTENEDOR CENTRAL */
    .centro {
      position: relative;
      z-index: 2;
      margin-top: 20px;
    }

    /* FOTO 1 (ARRIBA) */
    .foto1 {
      width: 260px;
      border-radius: 15px;
      margin: 10px auto;
      display: block;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* FOTO 2 (ABAJO) */
    .foto2 {
      width: 260px;
      border-radius: 15px;
      margin: 10px auto;
      display: block;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* STICKERS */
    .sticker {
      position: absolute;
      width: 100px;
      border-radius: 15px;
      opacity: 0.85;
      animation: flotar 6s ease-in-out infinite;
    }

    .s1 { top: 10%; left: 5%; animation-delay: 0s; }
    .s2 { top: 15%; right: 8%; animation-delay: 1s; }
    .s3 { bottom: 15%; left: 12%; animation-delay: 2s; }
    .s4 { bottom: 10%; right: 5%; animation-delay: 3s; }

    @keyframes flotar {
      0%   { transform: translateY(0px) rotate(0deg); }
      50%  { transform: translateY(-25px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
  </style>
</head>

<body>

<h1>❤️ Sabía que dirías que sí ❤️</h1>

<div class="centro">
  <img class="foto1" src="foto1.jpg">
  <img class="foto2" src="foto2.jpg">
</div>

<!-- STICKERS FLOTANDO -->
<img class="sticker s1" src="foto3.jpg">
<img class="sticker s2" src="foto4.jpg">
<img class="sticker s3" src="foto5.jpg">
<img class="sticker s4" src="foto6.jpg">

</body>
</html>
