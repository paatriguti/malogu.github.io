<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Nosotros ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(pink, #ffb6c1);
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 15px;
      font-size: 6vw;
      position: relative;
      z-index: 5;
    }

    /* CENTRO */
    .centro {
      position: relative;
      z-index: 5;
      margin-top: 10px;
    }

    .foto1, .foto2 {
      width: 55vw;
      max-width: 200px;
      border-radius: 15px;
      margin: 8px auto;
      display: block;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* STICKERS SOLO ALREDEDOR */
    .sticker {
      position: absolute;
      width: 85px;
      max-width: 20vw;
      border-radius: 15px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
      animation: flotar 6s ease-in-out infinite;
      z-index: 1; /* siempre detrás del centro pero visibles */
    }

    @keyframes flotar {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* 🔥 SOLO BORDE DE PANTALLA */
    .s1 { top: 2%; left: 2%; }
    .s2 { top: 2%; right: 2%; }
    .s3 { top: 20%; left: 2%; }
    .s4 { top: 20%; right: 2%; }
    .s5 { bottom: 20%; left: 2%; }
    .s6 { bottom: 20%; right: 2%; }
    .s7 { bottom: 2%; left: 25%; }
    .s8 { bottom: 2%; right: 25%; }
  </style>
</head>

<body>

<h1>❤️ Sabía que dirías que sí ❤️</h1>

<div class="centro">
  <img class="foto1" src="foto1.jpg">
  <img class="foto2" src="foto2.jpg">
</div>

<!-- STICKERS SOLO ALREDEDOR -->
<img class="sticker s1" src="foto3.jpg">
<img class="sticker s2" src="foto4.jpg">
<img class="sticker s3" src="foto5.jpg">
<img class="sticker s4" src="foto6.jpg">
<img class="sticker s5" src="foto3.jpg">
<img class="sticker s6" src="foto4.jpg">
<img class="sticker s7" src="foto5.jpg">
<img class="sticker s8" src="foto6.jpg">

</body>
</html>
