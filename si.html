<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Nosotros ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(pink, #ffb6c1);
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 15px;
      font-size: 6vw;
    }

    /* CENTRO */
    .centro {
      position: relative;
      z-index: 2;
      margin-top: 10px;
    }

    /* FOTOS CENTRALES RESPONSIVE */
    .foto1, .foto2 {
      width: 70vw;
      max-width: 260px;
      border-radius: 15px;
      margin: 10px auto;
      display: block;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* STICKERS FONDO */
    .sticker {
      position: absolute;
      width: 80px;
      max-width: 20vw;
      border-radius: 15px;
      opacity: 0.35;
      animation: flotar 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes flotar {
      0%   { transform: translateY(0px) rotate(0deg); }
      50%  { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* posiciones repetidas (fondo bonito sin saturar) */
    .s1 { top: 5%; left: 5%; }
    .s2 { top: 10%; right: 10%; animation-delay: 1s; }
    .s3 { top: 20%; left: 30%; animation-delay: 2s; }
    .s4 { top: 35%; right: 20%; animation-delay: 3s; }
    .s5 { bottom: 30%; left: 10%; animation-delay: 1.5s; }
    .s6 { bottom: 20%; right: 5%; animation-delay: 2.5s; }
    .s7 { bottom: 10%; left: 40%; animation-delay: 0.5s; }
    .s8 { top: 50%; left: 50%; animation-delay: 3.5s; }
  </style>
</head>

<body>

<h1>❤️ Sabía que dirías que sí ❤️</h1>

<div class="centro">
  <img class="foto1" src="foto1.jpg">
  <img class="foto2" src="foto2.jpg">
</div>

<!-- STICKERS REPETIDOS SUAVES -->
<img class="sticker s1" src="foto3.jpg">
<img class="sticker s2" src="foto4.jpg">
<img class="sticker s3" src="foto5.jpg">
<img class="sticker s4" src="foto6.jpg">
<img class="sticker s5" src="foto3.jpg">
<img class="sticker s6" src="foto4.jpg">
<img class="sticker s7" src="foto5.jpg">
<img class="sticker s8" src="foto6.jpg">

</body>
</html>
