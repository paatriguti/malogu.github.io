<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💌 Pregunta</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 20vh;
      font-size: 8vw;
      padding: 0 10px;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      background: yellow;
      border: none;
      padding: 15px 25px;
      font-size: 5vw;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
    }

    #noBtn {
      position: absolute;
    }
  </style>
</head>

<body>

<h1>¿Quieres ser mi novia? ❤️</h1>

<div class="buttons">
  <button onclick="irSi()">SI</button>
  <button id="noBtn" onmouseover="moverNo()">NO</button>
</div>

<script>
function irSi() {
  window.location.href = "si.html";
}

function moverNo() {
  let btn = document.getElementById("noBtn");

  // margen para que no se salga de pantalla
  let maxX = window.innerWidth - 100;
  let maxY = window.innerHeight - 100;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
