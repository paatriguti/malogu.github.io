<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Nosotros ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(pink, #ffb6c1);
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin-top: 15px;
      font-size: 6vw;
      position: relative;
      z-index: 3;
    }

    /* CENTRO */
    .centro {
      position: relative;
      z-index: 3;
      margin-top: 10px;
    }

    /* FOTOS PRINCIPALES MÁS PEQUEÑAS */
    .foto1, .foto2 {
      width: 55vw;
      max-width: 200px;
      border-radius: 15px;
      margin: 8px auto;
      display: block;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* STICKERS COMO FOTOS (SIN DIFUMINAR) */
    .sticker {
      position: absolute;
      width: 90px;
      max-width: 22vw;
      border-radius: 15px;
      opacity: 1; /* 👈 importante: SIN transparencia */
      animation: flotar 6s ease-in-out infinite;
      z-index: 2; /* 👈 detrás del centro pero visibles */
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }

    @keyframes flotar {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(4deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    /* POSICIONES */
    .s1 { top: 5%; left: 5%; }
    .s2 { top: 10%; right: 10%; animation-delay: 1s; }
    .s3 { top: 25%; left: 30%; animation-delay: 2s; }
    .s4 { top: 35%; right: 20%; animation-delay: 3s; }
    .s5 { bottom: 30%; left: 10%; animation-delay: 1.5s; }
    .s6 { bottom: 20%; right: 5%; animation-delay: 2.5s; }
    .s7 { bottom: 10%; left: 40%; animation-delay: 0.5s; }
    .s8 { top: 50%; left: 50%; animation-delay: 3.5s; }
  </style>
</head>

<body>

<h1>❤️ Sabía que dirías que sí ❤️</h1>

<div class="centro">
  <img class="foto1" src="foto1.jpg">
  <img class="foto2" src="foto2.jpg">
</div>

<!-- STICKERS VISIBLES -->
<img class="sticker s1" src="foto3.jpg">
<img class="sticker s2" src="foto4.jpg">
<img class="sticker s3" src="foto5.jpg">
<img class="sticker s4" src="foto6.jpg">
<img class="sticker s5" src="foto3.jpg">
<img class="sticker s6" src="foto4.jpg">
<img class="sticker s7" src="foto5.jpg">
<img class="sticker s8" src="foto6.jpg">

</body>
</html>
